<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS 송출용 타로 스프레드</title>
    <style>
        /* OBS용 투명한 배경, 또는 크로마키. */
        body {
            background: transparent; /* OBS 브라우저 소스를 쓰거나 우클릭 투명화를 위해 */
            margin: 0;
            padding: 20px;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* 윈도우 캡처 시 배경을 초록색으로 하고 싶다면 사용할 클래스 */
        .chroma-key-bg {
            background: #00ff00 !important;
        }

        #obs-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            max-width: 1920px;
        }

        .obs-card-slot {
            width: 160px;
            height: 270px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid #d4af37;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4af37;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .obs-card-image {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            border-radius: 6px;
        }

        .obs-card-label {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 8px;
            border: 1px solid #d4af37;
            border-radius: 4px;
            font-size: 0.9rem;
            white-space: nowrap;
            text-shadow: 1px 1px 2px #000;
        }

        /* 크로마키 토글 버튼 */
        #btn-toggle-bg {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 8px 12px;
            background: #333;
            color: #fff;
            border: 1px solid #666;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <button id="btn-toggle-bg" onclick="document.body.classList.toggle('chroma-key-bg')">크로마키 배경 전환 (Green Screen)</button>
    <div id="obs-container">
        <!-- Result will be injected here -->
        <h2 style="color:#d4af37; text-align:center;">타로 카드를 뽑으면 이 화면에 출력됩니다.</h2>
    </div>

    <script>
        const container = document.getElementById('obs-container');
        let lastStateStr = "";

        // 1. 채널 방식 (창 캡처용)
        const obsChannel = new BroadcastChannel('tarot_obs_channel');
        obsChannel.onmessage = (event) => {
            if (event.data.type === 'update_spread') {
                const stateStr = JSON.stringify(event.data);
                if (stateStr !== lastStateStr) {
                    renderCards(event.data.mode, event.data.cards);
                    lastStateStr = stateStr;
                }
            }
        };

        // 2. 파이썬 로컬 서버 통신 폴링 (푸지텍 같은 브라우저 소스 직접 캡처용)
        async function pollServer() {
            try {
                const response = await fetch('http://127.0.0.1:8099/state');
                const data = await response.json();
                if (data && data.type === 'update_spread') {
                    const stateStr = JSON.stringify(data);
                    if (stateStr !== lastStateStr) {
                        renderCards(data.mode, data.cards);
                        lastStateStr = stateStr;
                    }
                }
            } catch (e) {
                // 서버가 꺼져 있거나 오류가 나면 무시
            }
        }
        setInterval(pollServer, 1000); // 1초마다 동기화 체크
        pollServer();

        function renderCards(mode, cards) {
            container.innerHTML = '';
            
            cards.forEach((card, index) => {
                const slot = document.createElement('div');
                slot.className = 'obs-card-slot';

                if (card) {
                    const img = document.createElement('div');
                    img.className = 'obs-card-image';
                    const finalImg = card.image || `images/tarot_${card.id}.png`;
                    img.style.backgroundImage = `url('${finalImg}')`;
                    
                    if (card.isReversed) {
                        img.style.transform = 'rotate(180deg)';
                    }
                    slot.appendChild(img);

                    const korNameOrigin = card.name.split(' (')[0];
                    const label = document.createElement('div');
                    label.className = 'obs-card-label';
                    label.textContent = card.isReversed ? `${korNameOrigin} [역]` : korNameOrigin;
                    slot.appendChild(label);
                } else {
                    slot.innerHTML = `<span>?</span>`;
                }

                container.appendChild(slot);
            });
        }
    </script>
</body>
</html>
