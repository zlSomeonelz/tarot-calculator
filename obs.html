<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OBS Tarot Broadcast</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: transparent !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* OBS 편의성 스위치 컨트롤 */
        .obs-controls {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 9999;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            opacity: 0.1;
            transition: opacity 0.3s;
        }

        .obs-controls:hover { opacity: 1; }

        /* Hide unwanted elements from the injected HTML */
        .board-actions, header, footer, .search-wrap { display: none !important; }
        .slot-hint { display: none !important; }
        main { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

    </style>
</head>
<body id="obs-body">

    <div class="obs-controls">
        <label>
            <input type="checkbox" id="bg-toggle"> 크로마키 초록 배경 <small>(투명 배경이 기본입니다)</small>
        </label>
        <div style="font-size:12px; margin-top:5px; color:#aaa;">(마우스를 올리면 이 창이 보이며, 방송 중엔 이 창은 보이지 않습니다)</div>
    </div>

    <!-- The actual injected layout goes here -->
    <div id="obs-container" style="width:100%; height:100%; display:flex; justify-content:center; align-items:center; transform: scale(0.9);"></div>

    <script>
        const container = document.getElementById('obs-container');
        let lastStateStr = "";

        // 크로마키 배경 스위치
        document.getElementById('bg-toggle').addEventListener('change', (e) => {
            document.getElementById('obs-body').style.backgroundColor = e.target.checked ? '#00ff00' : 'transparent';
        });

        async function initLayout() {
            try {
                // index.html에서 구조를 그대로 복제해 옵니다. (스타일 유지)
                const res = await fetch('index.html');
                const text = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const mainBoards = doc.querySelector('main');
                
                mainBoards.querySelectorAll('section').forEach(sec => sec.classList.add('hidden'));
                container.appendChild(mainBoards);
                
                setInterval(pollServer, 1000);
                pollServer();
            } catch (e) {
                console.error("레이아웃 로딩 실패", e);
            }
        }

        const obsChannel = new BroadcastChannel('tarot_obs_channel');
        obsChannel.onmessage = (event) => {
            if (event.data.type === 'update_spread') {
                const stateStr = JSON.stringify(event.data);
                if (stateStr !== lastStateStr) {
                    renderCards(event.data.mode, event.data.cards);
                    lastStateStr = stateStr;
                }
            }
        };

        async function pollServer() {
            try {
                const response = await fetch('/state');
                const data = await response.json();
                if (data && data.type === 'update_spread') {
                    const stateStr = JSON.stringify(data);
                    if (stateStr !== lastStateStr) {
                        renderCards(data.mode, data.cards);
                        lastStateStr = stateStr;
                    }
                }
            } catch (e) {
                // Ignore API errors if offline
            }
        }

        function renderCards(mode, cards) {
            if (cards.length === 0) {
                // Completely hide all
                document.querySelectorAll('#obs-container main section').forEach(sec => sec.classList.add('hidden'));
                return;
            }

            let boardId, prefix;
            if (mode === 'spread3') { boardId = 'spread3-board'; prefix = 's3slot'; }
            else if (mode === 'tree') { boardId = 'tree-board'; prefix = 'tslot'; }
            else if (mode === 'relation') { boardId = 'relation-board'; prefix = 'rslot'; }
            else if (mode === 'celtic') { boardId = 'celtic-board'; prefix = 'cslot'; }
            else if (mode === 'hexa') { boardId = 'hexa-board'; prefix = 'hslot'; }
            else if (mode === 'zodiac') { boardId = 'zodiac-board'; prefix = 'zslot'; }
            else { boardId = 'board'; prefix = 'slot'; }

            // Hide all and show active
            document.querySelectorAll('#obs-container main section').forEach(sec => sec.classList.add('hidden'));
            const activeSec = document.getElementById(boardId);
            if (activeSec) activeSec.classList.remove('hidden');

            cards.forEach((card, index) => {
                const slotEl = document.getElementById(`${prefix}-${index}`);
                if (!slotEl) return;
                
                slotEl.style.backgroundImage = 'none';
                let bgLayer = slotEl.querySelector('.slot-bg-layer');
                if (!bgLayer) {
                    bgLayer = document.createElement('div');
                    bgLayer.className = 'slot-bg-layer';
                    slotEl.insertBefore(bgLayer, slotEl.firstChild);
                }

                if (card) {
                    const finalImg = card.image || `images/tarot_${card.id}.png`;
                    bgLayer.style.backgroundImage = `url('${finalImg}')`;
                    bgLayer.style.transform = card.isReversed ? 'rotate(180deg)' : 'none';
                    bgLayer.style.opacity = '1';

                    const korNameOrigin = card.name.split(' (')[0];
                    const displayKorName = card.isReversed ? `${korNameOrigin} [역]` : korNameOrigin;
                    slotEl.querySelector('.slot-content').innerHTML = displayKorName;
                    slotEl.setAttribute('data-active', 'true');
                } else {
                    bgLayer.style.backgroundImage = 'none';
                    bgLayer.style.transform = 'none';
                    bgLayer.style.opacity = '0';
                    slotEl.querySelector('.slot-content').innerHTML = '선택';
                    slotEl.removeAttribute('data-active');
                }
            });
        }

        initLayout();
    </script>
</body>
</html>
